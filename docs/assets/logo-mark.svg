<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="cc-imessage-remote-control — a red C, a blue C, and a friendly smile.">
  <style>
    .smile { stroke: #1a1a1a; fill: none; stroke-width: 9; stroke-linecap: round; }
    @media (prefers-color-scheme: dark) {
      .smile { stroke: #faf8f4; }
    }
  </style>

  <!-- Red C, slightly tilted left -->
  <text x="62" y="82"
        font-family="'Marker Felt', 'Comic Sans MS', 'Chalkboard SE', -apple-system, BlinkMacSystemFont, Inter, sans-serif"
        font-weight="900" font-size="90"
        fill="#e51e25"
        text-anchor="middle"
        transform="rotate(-6 62 82)">c</text>

  <!-- Blue C, slightly tilted right -->
  <text x="138" y="86"
        font-family="'Marker Felt', 'Comic Sans MS', 'Chalkboard SE', -apple-system, BlinkMacSystemFont, Inter, sans-serif"
        font-weight="900" font-size="90"
        fill="#0a84ff"
        text-anchor="middle"
        transform="rotate(6 138 86)">c</text>

  <!-- Wide TiVo-style smile, color adapts to background -->
  <path class="smile" d="M 50 108 Q 100 134 150 108"/>
</svg>
