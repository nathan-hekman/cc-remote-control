<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 320" role="img" aria-label="Flow diagram: iPhone texts 'Claude eBay'. Mac matches the Shortcut filter and opens a Terminal running 'claude --remote-control'. The session registers with Anthropic and shows up in the iOS Claude app.">
  <defs>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="100%" stop-color="#e8e8ec"/>
    </linearGradient>
    <linearGradient id="mac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f7"/>
      <stop offset="100%" stop-color="#dadce0"/>
    </linearGradient>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2b2b"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <style>
    .label { font: 600 12px -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif; fill: #1a1a1a; }
    .small { font: 500 10px -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif; fill: #6b6258; }
    .bubble-text { font: 500 13px -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif; fill: #fff; }
    .term-text { font: 500 11px ui-monospace, "SF Mono", Menlo, monospace; fill: #c4f0a0; }
    .term-prompt { fill: #6ab0ff; }
    .stage-title { font: 700 11px -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif; fill: #6b6258; letter-spacing: 0.12em; text-transform: uppercase; }
    @media (prefers-color-scheme: dark) {
      .label { fill: #f0eee8; }
      .small { fill: #b0a89c; }
      .stage-title { fill: #b0a89c; }
    }
  </style>

  <!-- iPhone (left) -->
  <g transform="translate(40, 60)">
    <text class="stage-title" x="65" y="-10" text-anchor="middle">Step 1 — iPhone</text>
    <rect x="0" y="0" width="130" height="220" rx="20" ry="20" fill="url(#phone)" stroke="#bcbcc2" stroke-width="1"/>
    <rect x="6" y="6" width="118" height="208" rx="15" ry="15" fill="#fff" stroke="#e3e3e8" stroke-width="0.5"/>
    <rect x="46" y="10" width="38" height="4" rx="2" ry="2" fill="#1a1a1a"/>
    <!-- Self-thread iMessage bubble (sent, blue) -->
    <rect x="34" y="60" width="80" height="34" rx="14" ry="14" fill="#0a84ff"/>
    <text class="bubble-text" x="74" y="81" text-anchor="middle">Claude eBay</text>
    <!-- Reply bubble (received, gray) -->
    <rect x="14" y="110" width="100" height="48" rx="14" ry="14" fill="#e8e8ec"/>
    <text x="64" y="128" text-anchor="middle" style="font: 500 10px -apple-system, BlinkMacSystemFont, sans-serif; fill: #1a1a1a;">[CR] Session</text>
    <text x="64" y="142" text-anchor="middle" style="font: 500 10px -apple-system, BlinkMacSystemFont, sans-serif; fill: #1a1a1a;">started in</text>
    <text x="64" y="155" text-anchor="middle" style="font: 600 10px -apple-system, BlinkMacSystemFont, sans-serif; fill: #1a1a1a;">ebay-scrape-new.</text>
    <!-- Compose bar -->
    <rect x="14" y="180" width="100" height="20" rx="10" ry="10" fill="#f3f3f5" stroke="#dadce0" stroke-width="0.5"/>
  </g>

  <!-- Arrow 1: Apple Push -->
  <g>
    <line x1="180" y1="160" x2="290" y2="160" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text class="small" x="235" y="153" text-anchor="middle">Apple Push</text>
    <text class="small" x="235" y="178" text-anchor="middle">(any network)</text>
  </g>

  <!-- Mac (middle) -->
  <g transform="translate(300, 60)">
    <text class="stage-title" x="190" y="-10" text-anchor="middle">Step 2 — Mac</text>
    <!-- Mac body -->
    <rect x="0" y="20" width="380" height="200" rx="8" ry="8" fill="url(#mac)" stroke="#bcbcc2" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="20" width="380" height="22" rx="8" ry="8" fill="#dadce0"/>
    <rect x="0" y="34" width="380" height="8" fill="#dadce0"/>
    <circle cx="14" cy="31" r="4" fill="#ff5f56"/>
    <circle cx="28" cy="31" r="4" fill="#ffbd2e"/>
    <circle cx="42" cy="31" r="4" fill="#27c93f"/>
    <text x="190" y="35" text-anchor="middle" style="font: 600 11px -apple-system, sans-serif; fill: #1a1a1a;">Shortcuts.app → Run Shell Script</text>
    <!-- Filter block -->
    <rect x="14" y="56" width="170" height="58" rx="6" ry="6" fill="#fff" stroke="#e6e1d6" stroke-width="1"/>
    <text class="small" x="22" y="71">FILTER (safety gate)</text>
    <text x="22" y="86" style="font: 500 11px -apple-system, sans-serif; fill: #1a1a1a;">Sender = you</text>
    <text x="22" y="101" style="font: 500 11px -apple-system, sans-serif; fill: #1a1a1a;">Contains "claude"</text>
    <!-- Pipeline block -->
    <rect x="196" y="56" width="170" height="58" rx="6" ry="6" fill="#fff" stroke="#e6e1d6" stroke-width="1"/>
    <text class="small" x="204" y="71">CLASSIFY (Haiku)</text>
    <text x="204" y="86" style="font: 500 11px -apple-system, sans-serif; fill: #1a1a1a;">"eBay" →</text>
    <text x="204" y="101" style="font: 600 11px ui-monospace, monospace; fill: #b8462f;">ebay-scrape-new</text>
    <!-- Terminal pop -->
    <rect x="14" y="124" width="352" height="84" rx="6" ry="6" fill="url(#term)" stroke="#000" stroke-width="0.5"/>
    <text class="term-text" x="24" y="142"><tspan class="term-prompt">$</tspan> cd ~/Documents/ebay-scrape-new</text>
    <text class="term-text" x="24" y="160"><tspan class="term-prompt">$</tspan> claude --remote-control "ebay-scrape-new"</text>
    <text class="term-text" x="24" y="180" style="fill:#ffd07a">  ✓ Session registered with claude.ai/code</text>
    <text class="term-text" x="24" y="196" style="fill:#6ab0ff">  Waiting for remote driver...</text>
  </g>

  <!-- Arrow 2: Anthropic cloud -->
  <g>
    <line x1="690" y1="160" x2="800" y2="160" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text class="small" x="745" y="153" text-anchor="middle">claude.ai/code</text>
    <text class="small" x="745" y="178" text-anchor="middle">(Anthropic cloud)</text>
  </g>

  <!-- iOS Claude app (right) -->
  <g transform="translate(810, 60)">
    <text class="stage-title" x="65" y="-10" text-anchor="middle">Step 3 — iOS Claude</text>
    <rect x="0" y="0" width="130" height="220" rx="20" ry="20" fill="url(#phone)" stroke="#bcbcc2" stroke-width="1"/>
    <rect x="6" y="6" width="118" height="208" rx="15" ry="15" fill="#fff" stroke="#e3e3e8" stroke-width="0.5"/>
    <rect x="46" y="10" width="38" height="4" rx="2" ry="2" fill="#1a1a1a"/>
    <!-- Header -->
    <text x="64" y="38" text-anchor="middle" style="font: 700 11px -apple-system, sans-serif; fill: #1a1a1a;">Code</text>
    <line x1="14" y1="48" x2="114" y2="48" stroke="#e6e1d6" stroke-width="0.5"/>
    <!-- Session entry (highlighted) -->
    <rect x="14" y="58" width="100" height="44" rx="8" ry="8" fill="#fbe7a3" stroke="#b8462f" stroke-width="1"/>
    <text x="22" y="74" style="font: 700 10.5px -apple-system, sans-serif; fill: #1a1a1a;">ebay-scrape-new</text>
    <text x="22" y="88" style="font: 500 9px -apple-system, sans-serif; fill: #6b6258;">Remote Control (Mac)</text>
    <text x="22" y="98" style="font: 500 9px -apple-system, sans-serif; fill: #b8462f;">● live · tap to drive</text>
    <!-- Other entries -->
    <rect x="14" y="110" width="100" height="34" rx="8" ry="8" fill="#f3eee4" stroke="#e6e1d6" stroke-width="0.5"/>
    <text x="22" y="124" style="font: 500 9.5px -apple-system, sans-serif; fill: #1a1a1a;">scrape-server</text>
    <text x="22" y="136" style="font: 500 9px -apple-system, sans-serif; fill: #6b6258;">last open 2h ago</text>
    <rect x="14" y="152" width="100" height="34" rx="8" ry="8" fill="#f3eee4" stroke="#e6e1d6" stroke-width="0.5"/>
    <text x="22" y="166" style="font: 500 9.5px -apple-system, sans-serif; fill: #1a1a1a;">cy-scraper-new</text>
    <text x="22" y="178" style="font: 500 9px -apple-system, sans-serif; fill: #6b6258;">last open yesterday</text>
  </g>

  <!-- Footer caption -->
  <text class="small" x="490" y="300" text-anchor="middle" style="font-weight: 600; font-size: 11px;">
    iMessage starts the session. Claude Code Remote Control drives it from there. Nothing reads chat.db.
  </text>
</svg>
